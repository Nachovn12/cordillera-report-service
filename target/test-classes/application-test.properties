# ============================================================
# Configuracion de pruebas - Perfil "test"
# Reemplaza MySQL con H2 en memoria para pruebas unitarias
# ============================================================

# H2 en memoria (reemplaza MySQL)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate con H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

# Desactivar SpringDoc en pruebas (evita escaneo de beans)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# URL del KPI Service (no conecta en pruebas unitarias)
services.kpi-service.url=http://localhost:8084

# Resilience4j - configuracion minima para pruebas
resilience4j.circuitbreaker.instances.kpiService.sliding-window-size=5
resilience4j.circuitbreaker.instances.kpiService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.kpiService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kpiService.wait-duration-in-open-state=10s
